<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras semanales como % del volumen del MULC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #fff; font-family: Arial, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container {
    width: 100%;
    max-width: 860px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 24px 20px 16px;
  }
  h2 {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    color: #111;
    margin-bottom: 6px;
    font-family: Arial, sans-serif;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 14px;
    font-size: 12px;
    font-weight: 700;
    color: #333;
    font-family: Arial, sans-serif;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .leg-bar { width: 14px; height: 14px; background: #4472C4; }
  .leg-line {
    width: 14px; height: 3px; background: #C00000;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .leg-line::after {
    content: '◆';
    color: #C00000;
    font-size: 10px;
    position: absolute;
  }
  .chart-wrap { position: relative; width: 100%; height: 380px; }
  .footer {
    font-size: 10px; color: #999; margin-top: 10px;
    border-top: 1px solid #eee; padding-top: 6px;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
<div class="container">
  <h2>Compras semanales como porcentaje del volumen del MULC</h2>
  <div class="legend">
    <div class="legend-item"><div class="leg-bar"></div> COMPRAS SEMANALES</div>
    <div class="legend-item"><div class="leg-line"></div> COMPRAS COMO % DEL VOLUMEN</div>
  </div>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
  <div class="footer">Fuente: Fortress Capital en base a datos del BCRA.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script>
// ── DATOS ─────────────────────────────────────────────────────────────────────
// Leídos del gráfico original (imagen). Compras en millones de u$s, % como decimal.
var DATA = [
  { label:'02/01', compras: 0,    pct: 0.00 },
  { label:'09/01', compras: 218,  pct: 0.02 },
  { label:'16/01', compras: 469,  pct: 0.11 },
  { label:'23/01', compras: 291,  pct: 0.24 },
  { label:'30/01', compras: 179,  pct: 0.19 },
  { label:'06/02', compras: 317,  pct: 0.13 },
  { label:'13/02', compras: 615,  pct: 0.23 },
  { label:'20/02', compras: 323,  pct: 0.25 },
  { label:'27/02', compras: 300,  pct: 0.20 },
  { label:'06/03', compras: 291,  pct: 0.13 },
  { label:'13/03', compras: 295,  pct: 0.15 },
  { label:'20/03', compras: 485,  pct: 0.23 },
  { label:'27/03', compras: 251,  pct: 0.29 },
  { label:'01/04', compras: 348,  pct: 0.17 },
  { label:'10/04', compras: 963,  pct: 0.44 },
  { label:'17/04', compras: 595,  pct: 0.24 },
  { label:'24/04', compras: 761,  pct: 0.27 },
  { label:'30/04', compras: 390,  pct: 0.15 },
  { label:'08/05', compras: 330,  pct: 0.15 },
  { label:'15/05', compras: 596,  pct: 0.23 },
  { label:'22/05', compras: 909,  pct: 0.31 },
  { label:'29/05', compras: 761,  pct: 0.30 },
  { label:'05/06', compras: 437,  pct: 0.18 },
  { label:'12/06', compras: 436,  pct: 0.18 },
  { label:'19/06', compras: 233,  pct: 0.10 },
  { label:'26/06', compras: 240,  pct: 0.10 },
  { label:'03/07', compras: 222,  pct: 0.09 },
  { label:'11/07', compras: 405,  pct: 0.10 },
  { label:'17/07', compras:1154,  pct: 0.40 },
];

var labels  = DATA.map(d => d.label);
var compras = DATA.map(d => d.compras);
var pcts    = DATA.map(d => d.pct * 100); // en %

// ── GRÁFICO ────────────────────────────────────────────────────────────────────
var ctx = document.getElementById('chart').getContext('2d');

new Chart(ctx, {
  data: {
    labels: labels,
    datasets: [
      {
        type: 'bar',
        label: 'Compras semanales',
        data: compras,
        yAxisID: 'y2',
        backgroundColor: '#4472C4',
        borderColor: '#4472C4',
        borderWidth: 0,
        borderRadius: 0,
        order: 2,
      },
      {
        type: 'line',
        label: 'Compras como % del volumen',
        data: pcts,
        yAxisID: 'y1',
        borderColor: '#C00000',
        backgroundColor: '#C00000',
        borderWidth: 2,
        pointStyle: 'rectRot',
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: '#C00000',
        pointBorderColor: '#C00000',
        tension: 0.3,
        fill: false,
        order: 1,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#fff',
        titleColor: '#111',
        bodyColor: '#444',
        borderColor: 'rgba(0,0,0,0.12)',
        borderWidth: 1,
        padding: 10,
        callbacks: {
          label: function(ctx) {
            if (ctx.datasetIndex === 0) return ' Compras: u$s' + ctx.parsed.y.toLocaleString('es-AR') + 'M';
            return ' % Volumen: ' + ctx.parsed.y.toFixed(1) + '%';
          }
        }
      },
      datalabels: { display: false }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: {
          color: '#555',
          font: { size: 10, family: 'Arial' },
          maxRotation: 45,
          minRotation: 45,
          autoSkip: false,
        }
      },
      y1: {
        position: 'left',
        min: 0,
        max: 50,
        grid: { color: 'rgba(0,0,0,0.07)' },
        border: { display: false },
        ticks: {
          color: '#555',
          font: { size: 11, family: 'Arial' },
          callback: v => v + '%',
          stepSize: 10,
        },
        title: {
          display: true,
          text: 'COMPRAS / VOLUMEN',
          color: '#555',
          font: { size: 10, family: 'Arial', weight: '700' },
          rotation: -90,
        }
      },
      y2: {
        position: 'right',
        min: 0,
        max: 1300,
        grid: { display: false },
        border: { display: false },
        ticks: {
          color: '#555',
          font: { size: 11, family: 'Arial' },
          callback: v => 'US$' + v.toLocaleString('en-US') + 'M',
          stepSize: 250,
        },
        title: {
          display: true,
          text: 'COMPRAS',
          color: '#555',
          font: { size: 10, family: 'Arial', weight: '700' },
        }
      }
    }
  }
});
</script>
</body>
</html>
